            </div>
            ${authData.remainingUses <= 0 ? `<div style="background:#fef2f2;padding:12px;border-radius:12px;border:1px solid #fca5a5;color:#991b1b;margin-bottom:16px;">⚠️ 使用次数已用完，请重新购买</div>` : ''}
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:16px; margin:16px 0;">
                <div style="background:#f8fafc;padding:20px;border-radius:16px;text-align:center;border:1px solid #e2e8f0;">
                    <div style="font-size:2rem;">🧬</div>
                    <h3>体质测试</h3>
                    <p style="font-size:0.85rem;color:#64748b;">28题判定九种体质</p>
                    <button class="btn btn-primary" style="margin-top:10px;padding:8px 20px;font-size:0.85rem;" onclick="if(!useOneUse()){alert('次数已用完');return;}alert('开始体质测试（完整版功能）')">开始测试</button>
                </div>
                <div style="background:#f8fafc;padding:20px;border-radius:16px;text-align:center;border:1px solid #e2e8f0;">
                    <div style="font-size:2rem;">🔍</div>
                    <h3>症状匹配</h3>
                    <p style="font-size:0.85rem;color:#64748b;">选择症状智能推荐</p>
                    <button class="btn btn-primary" style="margin-top:10px;padding:8px 20px;font-size:0.85rem;" onclick="if(!useOneUse()){alert('次数已用完');return;}alert('开始症状匹配（完整版功能）')">选择症状</button>
                </div>
                <div style="background:#f8fafc;padding:20px;border-radius:16px;text-align:center;border:1px solid #e2e8f0;">
                    <div style="font-size:2rem;">📄</div>
                    <h3>导出PDF</h3>
                    <p style="font-size:0.85rem;color:#64748b;">保存配方报告</p>
                    <button class="btn btn-primary" style="margin-top:10px;padding:8px 20px;font-size:0.85rem;" onclick="window.print()">导出PDF</button>
                </div>
            </div>
            <div style="margin-top:16px;">
                <h4 style="margin-bottom:10px;">📋 全部配方（${recipeList.length}个）</h4>
                <div style="max-height:400px;overflow-y:auto;">
                ${displayRecipes.map(r => `
                    <div style="background:#f9fafb;padding:12px 16px;border-radius:12px;margin-bottom:8px;border-left:3px solid ${r.warning_level === '禁用' ? '#e74c3c' : r.warning_level === '慎用' ? '#f39c12' : '#e67e22'};">
                        <strong>${r.name}</strong>
                        <span style="font-size:0.75rem;background:#e2e8f0;padding:2px 10px;border-radius:20px;margin-left:8px;">${r.category_secondary || r.category_primary}</span>
                        <span style="font-size:0.75rem;color:#64748b;margin-left:8px;">${(r.efficacy || '').substring(0,30)}${(r.efficacy || '').length > 30 ? '...' : ''}</span>
                        ${r.warning_level === '慎用' ? '<span class="warning-badge">慎用</span>' : ''}
                        ${r.warning_level === '禁用' ? '<span class="danger-badge">禁用</span>' : ''}
                    </div>
                `).join('')}
                </div>
                ${recipeList.length > 20 ? `<p style="text-align:center;color:#94a3b8;font-size:0.8rem;margin-top:8px;">显示前20个配方，共${recipeList.length}个</p>` : ''}
            </div>
            <div class="mt-4" style="border-top:1px solid #e2e8f0;padding-top:16px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">
                <span style="font-size:0.8rem;color:#94a3b8;">⚕️ 智能推荐仅供参考，请咨询执业医师</span>
                <button class="btn btn-secondary" style="padding:6px 16px;font-size:0.8rem;" onclick="localStorage.removeItem('yaojiu_auth');location.reload();">退出登录</button>
            </div>
        </div>
    `;
}

// ================================================================
// 🚀 启动
// ================================================================
loadAuth();
if (authData.isAuthorized && authData.remainingUses > 0) {
    showMainApp();
} else {
    showAuthLock();
}
console.log('💡 系统已就绪，共 ' + RECIPES.filter(r => r.category_primary !== '说明').length + ' 个配方');
</script>
</body>
</html>
